<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Dashboard | Jarvis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e4;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-top: 10px;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .summary-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .summary-card .label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .summary-card.cost .value {
            color: #00d4ff;
        }
        
        .summary-card.apis .value {
            color: #4ade80;
        }
        
        .summary-card.requests .value {
            color: #f472b6;
        }
        
        .summary-card.health .value {
            color: #fbbf24;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .api-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .api-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .api-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .api-name {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .api-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .api-status.connected {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        
        .api-status.error {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }
        
        .api-purpose {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .api-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .api-stat {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
        }
        
        .api-stat .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }
        
        .api-stat .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .cost-breakdown {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .cost-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .cost-row:last-child {
            border-bottom: none;
            font-weight: bold;
            font-size: 1.2rem;
            color: #00d4ff;
        }
        
        .cost-row .cost-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .cost-row .cost-amount {
            font-weight: 500;
        }
        
        .usage-chart {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }
        
        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 150px;
            margin-top: 20px;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
            border-radius: 4px 4px 0 0;
            min-height: 10px;
            position: relative;
        }
        
        .chart-bar .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #888;
        }
        
        .chart-bar .bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #fff;
        }
        
        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .refresh-btn {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: opacity 0.2s;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📡 API Dashboard</h1>
            <p class="subtitle">Track your connected services, usage, and costs</p>
        </header>
        
        <div class="summary-cards">
            <div class="summary-card cost">
                <div class="label">Monthly Cost</div>
                <div class="value" id="total-cost">$0</div>
                <div class="label">This month</div>
            </div>
            <div class="summary-card apis">
                <div class="label">Connected APIs</div>
                <div class="value" id="total-apis">0</div>
                <div class="label">Active</div>
            </div>
            <div class="summary-card requests">
                <div class="label">API Calls</div>
                <div class="value" id="total-requests">0</div>
                <div class="label">This month</div>
            </div>
            <div class="summary-card health">
                <div class="label">Health Score</div>
                <div class="value" id="health-score">--%</div>
                <div class="label">Uptime</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">💰 Cost Breakdown</h2>
            <div class="cost-breakdown" id="cost-breakdown">
                <!-- Populated by JS -->
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">🔌 Connected Services</h2>
            <div class="api-grid" id="api-grid">
                <!-- Populated by JS -->
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📊 Daily Usage (Last 7 Days)</h2>
            <div class="usage-chart">
                <div class="chart-bars" id="usage-chart">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
        
        <div class="last-updated">
            Last updated: <span id="last-updated">--</span>
            <br>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        </div>
    </div>
    
    <script>
        // API data - will be loaded from JSON
        let apiData = {
            lastUpdated: new Date().toISOString(),
            totalCost: 28.50,
            apis: [
                {
                    id: "anthropic",
                    name: "Anthropic (Claude)",
                    purpose: "Primary AI brain - powers all conversations",
                    status: "connected",
                    cost: 22.00,
                    requests: 1847,
                    inputTokens: 2450000,
                    outputTokens: 890000
                },
                {
                    id: "xai",
                    name: "xAI / Grok",
                    purpose: "X (Twitter) search & research",
                    status: "connected",
                    cost: 4.50,
                    requests: 245,
                    xSearches: 89
                },
                {
                    id: "whoop",
                    name: "Whoop",
                    purpose: "Fitness & recovery tracking",
                    status: "connected",
                    cost: 0,
                    requests: 62,
                    lastSync: "2h ago"
                },
                {
                    id: "withings",
                    name: "Withings",
                    purpose: "Weight & body composition",
                    status: "connected",
                    cost: 0,
                    requests: 8,
                    lastSync: "4h ago"
                },
                {
                    id: "telegram",
                    name: "Telegram",
                    purpose: "Primary communication channel",
                    status: "connected",
                    cost: 0,
                    requests: 523,
                    messages: 523
                },
                {
                    id: "ticktick",
                    name: "TickTick",
                    purpose: "Task management",
                    status: "connected",
                    cost: 0,
                    requests: 31,
                    lastSync: "1h ago"
                },
                {
                    id: "gmail",
                    name: "Gmail",
                    purpose: "Email monitoring & alerts",
                    status: "connected",
                    cost: 0,
                    requests: 186,
                    emailsScanned: 186
                },
                {
                    id: "github",
                    name: "GitHub",
                    purpose: "Code deployments",
                    status: "connected",
                    cost: 0,
                    requests: 14,
                    deploys: 7
                },
                {
                    id: "brave",
                    name: "Brave Search",
                    purpose: "Web search",
                    status: "connected",
                    cost: 0,
                    requests: 89,
                    searches: 89
                }
            ],
            dailyUsage: [
                { day: "Jan 25", cost: 3.20, requests: 312 },
                { day: "Jan 26", cost: 4.10, requests: 428 },
                { day: "Jan 27", cost: 3.80, requests: 385 },
                { day: "Jan 28", cost: 5.20, requests: 521 },
                { day: "Jan 29", cost: 4.50, requests: 467 },
                { day: "Jan 30", cost: 4.20, requests: 445 },
                { day: "Jan 31", cost: 3.50, requests: 347 }
            ]
        };
        
        function loadData() {
            // Try to load from JSON file
            fetch('data.json')
                .then(r => r.json())
                .then(data => {
                    apiData = data;
                    render();
                })
                .catch(() => {
                    // Use default data
                    render();
                });
        }
        
        function render() {
            // Summary cards
            document.getElementById('total-cost').textContent = '$' + apiData.totalCost.toFixed(2);
            document.getElementById('total-apis').textContent = apiData.apis.filter(a => a.status === 'connected').length;
            document.getElementById('total-requests').textContent = apiData.apis.reduce((sum, a) => sum + (a.requests || 0), 0).toLocaleString();
            
            const connectedCount = apiData.apis.filter(a => a.status === 'connected').length;
            const healthPct = Math.round((connectedCount / apiData.apis.length) * 100);
            document.getElementById('health-score').textContent = healthPct + '%';
            
            // Cost breakdown
            const costBreakdown = document.getElementById('cost-breakdown');
            const costsHtml = apiData.apis
                .filter(a => a.cost > 0)
                .sort((a, b) => b.cost - a.cost)
                .map(a => `
                    <div class="cost-row">
                        <span class="cost-name">${a.name}</span>
                        <span class="cost-amount">$${a.cost.toFixed(2)}</span>
                    </div>
                `).join('');
            
            const freeCostHtml = `
                <div class="cost-row">
                    <span class="cost-name">Free APIs (${apiData.apis.filter(a => a.cost === 0).length})</span>
                    <span class="cost-amount">$0.00</span>
                </div>
            `;
            
            const totalHtml = `
                <div class="cost-row">
                    <span class="cost-name">Total</span>
                    <span class="cost-amount">$${apiData.totalCost.toFixed(2)}</span>
                </div>
            `;
            
            costBreakdown.innerHTML = costsHtml + freeCostHtml + totalHtml;
            
            // API cards
            const apiGrid = document.getElementById('api-grid');
            apiGrid.innerHTML = apiData.apis.map(api => `
                <div class="api-card">
                    <div class="api-header">
                        <span class="api-name">${api.name}</span>
                        <span class="api-status ${api.status}">${api.status === 'connected' ? '✓ Connected' : '✗ Error'}</span>
                    </div>
                    <div class="api-purpose">${api.purpose}</div>
                    <div class="api-stats">
                        <div class="api-stat">
                            <div class="stat-value">${(api.requests || 0).toLocaleString()}</div>
                            <div class="stat-label">Requests</div>
                        </div>
                        <div class="api-stat">
                            <div class="stat-value">$${(api.cost || 0).toFixed(2)}</div>
                            <div class="stat-label">Cost</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Usage chart
            const maxCost = Math.max(...apiData.dailyUsage.map(d => d.cost));
            const chart = document.getElementById('usage-chart');
            chart.innerHTML = apiData.dailyUsage.map(day => {
                const height = (day.cost / maxCost) * 100;
                return `
                    <div class="chart-bar" style="height: ${height}%">
                        <span class="bar-value">$${day.cost.toFixed(0)}</span>
                        <span class="bar-label">${day.day.split(' ')[1]}</span>
                    </div>
                `;
            }).join('');
            
            // Last updated
            document.getElementById('last-updated').textContent = new Date(apiData.lastUpdated).toLocaleString();
        }
        
        // Initial load
        loadData();
    </script>
</body>
</html>
