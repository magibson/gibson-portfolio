<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. - Kanban Board</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        jarvis: {
          blue: '#00d4ff',
          cyan: '#00f0ff',
          dark: '#0a0f1a',
          panel: '#0d1829',
          glow: '#00d4ff'
        }
      },
      fontFamily: {
        orbitron: ['Orbitron', 'sans-serif'],
        rajdhani: ['Rajdhani', 'sans-serif']
      }
    }
  }
}
</script>
<style>
  * { font-family: 'Rajdhani', sans-serif; }
  h1, h2, h3, .time-display, .title-text { font-family: 'Orbitron', sans-serif; }
  
  body { 
    background: #050810;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  
  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  
  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
  }
  
  /* Scan line effect */
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
    animation: scanLine 4s linear infinite;
    pointer-events: none;
    z-index: 1000;
  }
  
  @keyframes scanLine {
    0% { top: -2px; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }
  
  /* HUD Card styling */
  .hud-card {
    background: linear-gradient(135deg, rgba(13,24,41,0.9), rgba(10,15,26,0.95));
    border: 1px solid rgba(0,212,255,0.3);
    position: relative;
    backdrop-filter: blur(10px);
  }
  
  .hud-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.8), transparent);
  }
  
  .hud-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
  }
  
  /* Corner accents */
  .hud-corner {
    position: relative;
  }
  .hud-corner::before,
  .hud-corner::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(0,212,255,0.6);
  }
  .hud-corner::before {
    top: -1px;
    left: -1px;
    border-right: none;
    border-bottom: none;
  }
  .hud-corner::after {
    bottom: -1px;
    right: -1px;
    border-left: none;
    border-top: none;
  }
  
  /* Glow effects */
  .glow-text { 
    text-shadow: 0 0 10px rgba(0,212,255,0.8), 0 0 20px rgba(0,212,255,0.5), 0 0 30px rgba(0,212,255,0.3); 
  }
  .glow-box { 
    box-shadow: 0 0 20px rgba(0,212,255,0.2), inset 0 0 20px rgba(0,212,255,0.05); 
  }
  
  /* Status indicator */
  .status-online {
    animation: statusPulse 1.5s ease-in-out infinite;
  }
  @keyframes statusPulse {
    0%, 100% { box-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88; }
    50% { box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88; }
  }
  
  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: rgba(0,212,255,0.1); }
  ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.5); border-radius: 2px; }
  
  /* Button hover effects */
  .hud-btn {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    transition: all 0.3s ease;
  }
  .hud-btn:hover {
    background: rgba(0,212,255,0.2);
    border-color: rgba(0,212,255,0.6);
    box-shadow: 0 0 15px rgba(0,212,255,0.4);
  }
  
  .refresh-spin { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Kanban Column Styling */
  .kanban-column {
    min-height: 400px;
    background: rgba(0,212,255,0.03);
    border: 1px solid rgba(0,212,255,0.15);
    transition: all 0.3s ease;
  }
  
  .kanban-column.backlog {
    border-top: 3px solid rgba(148, 163, 184, 0.6);
  }
  
  .kanban-column.in-progress {
    border-top: 3px solid rgba(251, 191, 36, 0.8);
  }
  
  .kanban-column.done {
    border-top: 3px solid rgba(34, 197, 94, 0.8);
  }
  
  /* Kanban Card Styling */
  .kanban-card {
    background: linear-gradient(135deg, rgba(13,24,41,0.95), rgba(10,15,26,0.98));
    border: 1px solid rgba(0,212,255,0.2);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  
  .kanban-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
  }
  
  .kanban-card:hover {
    border-color: rgba(0,212,255,0.5);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,212,255,0.15);
  }
  
  .kanban-card.backlog-card:hover {
    border-color: rgba(148, 163, 184, 0.5);
    box-shadow: 0 4px 20px rgba(148, 163, 184, 0.15);
  }
  
  .kanban-card.progress-card:hover {
    border-color: rgba(251, 191, 36, 0.5);
    box-shadow: 0 4px 20px rgba(251, 191, 36, 0.15);
  }
  
  .kanban-card.done-card:hover {
    border-color: rgba(34, 197, 94, 0.5);
    box-shadow: 0 4px 20px rgba(34, 197, 94, 0.15);
  }
  
  /* Project Tag */
  .project-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    color: rgba(0,212,255,0.8);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  /* Column Header Count Badge */
  .count-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
  }
  
  .count-badge.backlog {
    background: rgba(148, 163, 184, 0.15);
    color: rgba(148, 163, 184, 0.9);
  }
  
  .count-badge.in-progress {
    background: rgba(251, 191, 36, 0.15);
    color: rgba(251, 191, 36, 0.9);
  }
  
  .count-badge.done {
    background: rgba(34, 197, 94, 0.15);
    color: rgba(34, 197, 94, 0.9);
  }
  
  /* Column Icons */
  .column-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 14px;
  }
  
  .column-icon.backlog {
    background: rgba(148, 163, 184, 0.1);
    color: rgba(148, 163, 184, 0.8);
    border: 1px solid rgba(148, 163, 184, 0.2);
  }
  
  .column-icon.in-progress {
    background: rgba(251, 191, 36, 0.1);
    color: rgba(251, 191, 36, 0.8);
    border: 1px solid rgba(251, 191, 36, 0.2);
    animation: progressPulse 2s ease-in-out infinite;
  }
  
  .column-icon.done {
    background: rgba(34, 197, 94, 0.1);
    color: rgba(34, 197, 94, 0.8);
    border: 1px solid rgba(34, 197, 94, 0.2);
  }
  
  @keyframes progressPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(251, 191, 36, 0.3); }
    50% { box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
  }
  
  /* Time ago indicator */
  .time-ago {
    font-size: 10px;
    color: rgba(0,212,255,0.4);
  }
  
  /* Data stream effect for loading */
  .data-stream {
    background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.1) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: dataStream 3s linear infinite;
  }
  @keyframes dataStream {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
</style>
</head>
<body class="text-cyan-100 p-3 md:p-4 relative z-10">

<div class="max-w-7xl mx-auto">
  
  <!-- Header -->
  <header class="hud-card hud-corner rounded-lg p-4 mb-4 glow-box">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <div class="flex items-center gap-4">
        <a href="index.html" class="hud-btn p-2 rounded-lg" title="Back to Dashboard">
          <i class="fas fa-arrow-left text-cyan-400"></i>
        </a>
        <div>
          <div class="flex items-center gap-2 mb-1">
            <div class="w-2 h-2 rounded-full bg-cyan-400 status-online"></div>
            <span class="text-xs text-cyan-400 uppercase tracking-[0.2em] font-orbitron">Task Board</span>
          </div>
          <h1 class="text-2xl md:text-3xl font-orbitron text-cyan-300 glow-text">
            <i class="fas fa-columns mr-2"></i>Kanban Board
          </h1>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <p class="text-xs text-cyan-500/40 uppercase tracking-widest font-orbitron">Last Sync</p>
          <p class="text-sm text-cyan-400/60" id="lastUpdate">--</p>
        </div>
        <button onclick="refreshData()" class="p-2.5 rounded-lg hud-btn" title="Refresh">
          <i class="fas fa-sync-alt text-cyan-400" id="refreshIcon"></i>
        </button>
      </div>
    </div>
    
    <!-- Subtitle Bar -->
    <div class="mt-3 pt-3 border-t border-cyan-500/20 flex items-center justify-between">
      <p class="text-xs text-cyan-500/60">
        <i class="fas fa-robot mr-1"></i>
        Tasks managed by <span class="text-cyan-400 font-orbitron">J.A.R.V.I.S</span>
      </p>
      <div class="flex items-center gap-4 text-xs text-cyan-500/40">
        <span id="totalTasks">-- tasks</span>
        <span>•</span>
        <span>Auto-refresh: 60s</span>
      </div>
    </div>
  </header>

  <!-- Kanban Board -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="kanbanBoard">
    
    <!-- Backlog Column -->
    <div class="kanban-column backlog rounded-lg p-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div class="column-icon backlog">
            <i class="fas fa-inbox"></i>
          </div>
          <div>
            <h2 class="text-sm font-orbitron text-slate-300 uppercase tracking-wider">Backlog</h2>
            <p class="text-xs text-cyan-500/40">Queued for processing</p>
          </div>
        </div>
        <span class="count-badge backlog" id="backlogCount">0</span>
      </div>
      <div class="space-y-3" id="backlogTasks">
        <div class="data-stream h-24 rounded-lg"></div>
      </div>
    </div>
    
    <!-- In Progress Column -->
    <div class="kanban-column in-progress rounded-lg p-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div class="column-icon in-progress">
            <i class="fas fa-cog fa-spin"></i>
          </div>
          <div>
            <h2 class="text-sm font-orbitron text-amber-300 uppercase tracking-wider">In Progress</h2>
            <p class="text-xs text-cyan-500/40">Currently processing</p>
          </div>
        </div>
        <span class="count-badge in-progress" id="progressCount">0</span>
      </div>
      <div class="space-y-3" id="progressTasks">
        <div class="data-stream h-24 rounded-lg"></div>
      </div>
    </div>
    
    <!-- Done Column -->
    <div class="kanban-column done rounded-lg p-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div class="column-icon done">
            <i class="fas fa-check"></i>
          </div>
          <div>
            <h2 class="text-sm font-orbitron text-green-400 uppercase tracking-wider">Done</h2>
            <p class="text-xs text-cyan-500/40">Completed tasks</p>
          </div>
        </div>
        <span class="count-badge done" id="doneCount">0</span>
      </div>
      <div class="space-y-3" id="doneTasks">
        <div class="data-stream h-24 rounded-lg"></div>
      </div>
    </div>
    
  </div>

  <!-- Footer -->
  <footer class="mt-4 text-center text-xs text-cyan-500/30">
    <p>J.A.R.V.I.S. Kanban System • Data synced from kanban.json</p>
  </footer>

</div>

<script>
// Time ago formatting
function timeAgo(dateString) {
  const date = new Date(dateString);
  const now = new Date();
  const seconds = Math.floor((now - date) / 1000);
  
  const intervals = {
    year: 31536000,
    month: 2592000,
    week: 604800,
    day: 86400,
    hour: 3600,
    minute: 60
  };
  
  for (const [unit, secondsInUnit] of Object.entries(intervals)) {
    const interval = Math.floor(seconds / secondsInUnit);
    if (interval >= 1) {
      return `${interval} ${unit}${interval > 1 ? 's' : ''} ago`;
    }
  }
  return 'Just now';
}

// Create a task card
function createTaskCard(task, type) {
  const cardClass = type === 'backlog' ? 'backlog-card' : 
                    type === 'progress' ? 'progress-card' : 'done-card';
  
  return `
    <div class="kanban-card ${cardClass} rounded-lg p-3">
      <div class="flex items-start justify-between gap-2 mb-2">
        <h3 class="text-sm font-semibold text-cyan-200">${task.name}</h3>
      </div>
      <p class="text-xs text-cyan-400/60 mb-3 leading-relaxed">${task.description}</p>
      <div class="flex items-center justify-between">
        <span class="project-tag">${task.project}</span>
        <span class="time-ago">${timeAgo(task.lastUpdated)}</span>
      </div>
    </div>
  `;
}

// Render the kanban board
function renderKanban(data) {
  const backlogEl = document.getElementById('backlogTasks');
  const progressEl = document.getElementById('progressTasks');
  const doneEl = document.getElementById('doneTasks');
  
  const backlogTasks = data.columns.backlog.tasks;
  const progressTasks = data.columns.inProgress.tasks;
  const doneTasks = data.columns.done.tasks;
  
  // Render backlog
  backlogEl.innerHTML = backlogTasks.length > 0 
    ? backlogTasks.map(t => createTaskCard(t, 'backlog')).join('')
    : '<div class="text-center text-cyan-500/40 text-sm py-8"><i class="fas fa-inbox mr-2"></i>No tasks in backlog</div>';
  
  // Render in progress
  progressEl.innerHTML = progressTasks.length > 0 
    ? progressTasks.map(t => createTaskCard(t, 'progress')).join('')
    : '<div class="text-center text-cyan-500/40 text-sm py-8"><i class="fas fa-pause mr-2"></i>No tasks in progress</div>';
  
  // Render done
  doneEl.innerHTML = doneTasks.length > 0 
    ? doneTasks.map(t => createTaskCard(t, 'done')).join('')
    : '<div class="text-center text-cyan-500/40 text-sm py-8"><i class="fas fa-check-circle mr-2"></i>No completed tasks</div>';
  
  // Update counts
  document.getElementById('backlogCount').textContent = backlogTasks.length;
  document.getElementById('progressCount').textContent = progressTasks.length;
  document.getElementById('doneCount').textContent = doneTasks.length;
  
  // Update total
  const total = backlogTasks.length + progressTasks.length + doneTasks.length;
  document.getElementById('totalTasks').textContent = `${total} tasks`;
  
  // Update last sync
  document.getElementById('lastUpdate').textContent = timeAgo(data.lastUpdated);
}

// Fetch and load data
async function loadData() {
  try {
    const response = await fetch('kanban.json?t=' + Date.now());
    const data = await response.json();
    renderKanban(data);
  } catch (error) {
    console.error('Failed to load kanban data:', error);
    document.getElementById('backlogTasks').innerHTML = '<div class="text-red-400 text-sm text-center py-4"><i class="fas fa-exclamation-triangle mr-2"></i>Failed to load data</div>';
  }
}

// Refresh with animation
function refreshData() {
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('refresh-spin');
  loadData().finally(() => {
    setTimeout(() => icon.classList.remove('refresh-spin'), 500);
  });
}

// Initial load
loadData();

// Auto-refresh every 60 seconds
setInterval(loadData, 60000);
</script>

</body>
</html>
